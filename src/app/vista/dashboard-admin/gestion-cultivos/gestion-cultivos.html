<!-- VISTA LISTA -->
<div *ngIf="vista === 'lista'" class="modulo-container">
  <div class="modulo-header">
    <h2>Gestión de Cultivos</h2>
    <button class="btn-nuevo" (click)="nuevo()">+ Nuevo Cultivo</button>
  </div>
  <table class="tabla">
    <thead>
      <tr>
        <th>Id</th><th>Nombre</th><th>Tipo</th><th>Descripción</th><th>Estado</th><th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of cultivos">
        <td>{{c.id}}</td>
        <td>{{ c.nombre }}</td>
        <td>{{ c.tipo }}</td>
        <td>{{ c.descripcion }}</td>
        <td><span [class]="'badge badge-' + c.estado.toLowerCase()">{{ c.estado }}</span></td>
        <td class="acciones">
          <button class="btn-editar" (click)="editar(c)">Editar</button>
          <button *ngIf="c.estado === 'Inactivo'" class="btn-aprobar" (click)="toggleEstado(c)">Activar</button>
          <button *ngIf="c.estado === 'Inactivo'" class="btn-rechazar" (click)="eliminar(c)">Eliminar</button>
          <button *ngIf="c.estado === 'Activo'" class="btn-rechazar" (click)="toggleEstado(c)">Desactivar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- VISTA FORMULARIO -->
<div *ngIf="vista === 'formulario'" class="modulo-container">
  <div class="modulo-header">
    <h2>{{ modoEdicion ? 'Editar Cultivo' : 'Nuevo Cultivo' }}</h2>
  </div>
  <div class="formulario">

    <div class="campo">
      <label>Nombre del Cultivo <span class="obligatorio">*</span></label>
      <input type="text" name="nombre" [(ngModel)]="formulario.nombre" required
        #nombreRef="ngModel"
        [class.input-error]="nombreRef.invalid && (nombreRef.touched || intentoEnvio)"/>
      <span class="mensaje-error" *ngIf="nombreRef.invalid && (nombreRef.touched || intentoEnvio)">
        El nombre es obligatorio.
      </span>
    </div>

    <div class="campo">
      <label>Tipo de Cultivo <span class="obligatorio">*</span></label>
      <input type="text" name="tipo" [(ngModel)]="formulario.tipo" required
        #tipoRef="ngModel"
        [class.input-error]="tipoRef.invalid && (tipoRef.touched || intentoEnvio)"/>
      <span class="mensaje-error" *ngIf="tipoRef.invalid && (tipoRef.touched || intentoEnvio)">
        El tipo es obligatorio.
      </span>
    </div>

    <div class="campo">
      <label>Descripción</label>
      <input type="text" name="descripcion" [(ngModel)]="formulario.descripcion"/>
    </div>

    <div class="form-botones">
      <button class="btn-guardar" [disabled]="cargando" (click)="guardar()">
        {{ cargando ? 'Guardando...' : 'Guardar' }}
      </button>
      <button class="btn-cancelar" (click)="volver()">Cancelar</button>
    </div>

  </div>
</div>

<app-exito *ngIf="vista === 'exito'" mensaje="El cultivo ha sido guardado correctamente." (volver)="volver()"></app-exito>
