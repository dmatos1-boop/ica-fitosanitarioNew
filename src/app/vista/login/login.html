<div class="login-container">
  <div class="login-card">

    <h2 class="titulo">Iniciar Sesión</h2>
    <p class="subtitulo">Bienvenido, ingresa tus datos</p>

    <form class="log" (ngSubmit)="login()" #loginForm="ngForm">

      <div class="campo-grupo">
        <label for="usuario">Correo electrónico</label>
        <input
          id="usuario"
          name="usuario"
          type="email"
          placeholder="Ingresar correo"
          [(ngModel)]="usuario"
          required
          #usuarioRef="ngModel"
          [class.input-error]="usuarioRef.invalid && (usuarioRef.touched || intentoEnvio)">
        <span class="mensaje-error" *ngIf="usuarioRef.invalid && (usuarioRef.touched || intentoEnvio)">
          El correo es obligatorio.
        </span>
      </div>

      <div class="campo-grupo">
        <label for="password">Contraseña</label>
        <input
          id="password"
          name="password"
          type="password"
          placeholder="Ingresar contraseña"
          [(ngModel)]="password"
          required
          #passwordRef="ngModel"
          [class.input-error]="passwordRef.invalid && (passwordRef.touched || intentoEnvio)">
        <span class="mensaje-error" *ngIf="passwordRef.invalid && (passwordRef.touched || intentoEnvio)">
          La contraseña es obligatoria.
        </span>
      </div>

      <div class="mensaje-error-general" *ngIf="error">
        {{ error }}
      </div>

      <a href="#" class="olvido-password">¿Olvidaste tu contraseña?</a>

      <button type="submit" class="btn-ingreso" [disabled]="cargando">
        {{ cargando ? 'Ingresando...' : 'Ingresar' }}
      </button>

    </form>
  </div>
</div>
