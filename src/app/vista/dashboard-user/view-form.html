<div class="box-form" *ngIf="!exito">
  <div class="formulario-card">
    <h2>Solicitud de Registro de Predio</h2>
    <form #formPredio="ngForm" (ngSubmit)="guardarFormulario()">

      <label>Nombre del predio <span class="obligatorio">*</span></label>
      <input type="text" name="nombre" [(ngModel)]="formData.nombre" required
        #nombreRef="ngModel"
        [class.input-error]="nombreRef.invalid && (nombreRef.touched || intentoEnvio)"
        placeholder="Nombre de la hacienda o finca">
      <span class="mensaje-error" *ngIf="nombreRef.invalid && (nombreRef.touched || intentoEnvio)">
        El nombre del predio es obligatorio.
      </span>

      <label>Departamento <span class="obligatorio">*</span></label>
      <select name="departamento" [(ngModel)]="departamentoSeleccionado" (change)="cargarMunicipios()" required
        #deptRef="ngModel"
        [class.input-error]="deptRef.invalid && (deptRef.touched || intentoEnvio)">
        <option value="">Seleccione un departamento</option>
        <option *ngFor="let d of departamentos" [value]="d">{{ d }}</option>
      </select>
      <span class="mensaje-error" *ngIf="deptRef.invalid && (deptRef.touched || intentoEnvio)">
        Seleccione un departamento.
      </span>

      <label>Ciudad / Municipio <span class="obligatorio">*</span></label>
      <select name="municipio" [(ngModel)]="municipioSeleccionado" required
        #municipioRef="ngModel"
        [class.input-error]="municipioRef.invalid && (municipioRef.touched || intentoEnvio)">
        <option value="">Seleccione un municipio</option>
        <option *ngFor="let m of municipios" [value]="m">{{ m }}</option>
      </select>
      <span class="mensaje-error" *ngIf="municipioRef.invalid && (municipioRef.touched || intentoEnvio)">
        Seleccione un municipio.
      </span>

      <label>Dirección</label>
      <input type="text" name="direccion" [(ngModel)]="formData.direccion"
        placeholder="Dirección del predio">

      <label>Hectáreas <span class="obligatorio">*</span></label>
      <input type="number" name="extension" [(ngModel)]="formData.extension" required
        #extensionRef="ngModel"
        [class.input-error]="extensionRef.invalid && (extensionRef.touched || intentoEnvio)"
        placeholder="12">
      <span class="mensaje-error" *ngIf="extensionRef.invalid && (extensionRef.touched || intentoEnvio)">
        Ingresa la extensión en hectáreas.
      </span>

      <div *ngIf="error" class="mensaje-error-general">{{ error }}</div>

      <div class="form-botones">
        <button type="submit" class="btn-verde" [disabled]="cargando">
          {{ cargando ? 'Enviando...' : 'Enviar solicitud' }}
        </button>
        <button type="button" class="btn-cancelar" routerLink="/usuario/predio">Cancelar</button>
      </div>

    </form>
  </div>
</div>

<app-exito
  *ngIf="exito"
  mensaje="La solicitud del predio fue enviada correctamente"
  (volver)="volverListado()">
</app-exito>
