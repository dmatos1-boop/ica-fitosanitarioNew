<div class="box-form" *ngIf="!exito">
  <div class="formulario-card">
    <h2>Solicitud de Registro de Predio</h2>
    <form #formPredio="ngForm" (ngSubmit)="guardarFormulario()">

      <label>Nombre del predio</label>
      <input type="text" name="nombre" [(ngModel)]="formData.nombre" required placeholder="Nombre de la hacienda o finca">

      <label>Departamento</label>
      <select name="departamento" [(ngModel)]="departamentoSeleccionado" (change)="cargarMunicipios()" required>
        <option value="">Seleccione un departamento</option>
        <option *ngFor="let d of departamentos" [value]="d">{{ d }}</option>
      </select>

      <label>Ciudad / Municipio</label>
      <select name="municipio" [(ngModel)]="municipioSeleccionado" required>
        <option value="">Seleccione un municipio</option>
        <option *ngFor="let m of municipios" [value]="m">{{ m }}</option>
      </select>

      <label>Dirección</label>
      <input type="text" name="direccion" [(ngModel)]="formData.direccion" placeholder="Dirección del predio">

      <label>Hectáreas</label>
      <input type="number" name="extension" [(ngModel)]="formData.extension" required placeholder="12">

      <div *ngIf="error" class="mensaje-error">{{ error }}</div>

      <div class="form-botones">
        <button type="submit" class="btn-verde" [disabled]="cargando">
          {{ cargando ? 'Enviando...' : 'Enviar solicitud' }}
        </button>
        <button type="button" class="btn-cancelar" routerLink="/usuario/predio">Cancelar</button>
      </div>

    </form>
  </div>
</div>

<app-exito
  *ngIf="exito"
  mensaje="La solicitud del predio fue enviada correctamente"
  (volver)="volverListado()">
</app-exito>
