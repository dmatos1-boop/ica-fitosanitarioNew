<div class="form-container">
  <h1>Registro de Lugar de Producción</h1>

  <form (ngSubmit)="registrarProduccion()">

    <label>Nombre del lugar</label>
    <input type="text" name="nombre" [(ngModel)]="formData.nombre" required placeholder="Nombre del lugar de producción">

    <label>Predio asociado</label>
    <select name="predio" [(ngModel)]="formData.predioId" required>
      <option value="">Seleccione un predio</option>
      <option *ngFor="let predio of predios" [value]="predio.nroRegistroICA">
        {{ predio.nombre }}
      </option>
    </select>

    <label>Extensión (hectáreas)</label>
    <input type="number" name="extension" [(ngModel)]="formData.extension" placeholder="Extensión en hectáreas">

    <label>Tipo de producción</label>
    <select name="tipoProduccion" [(ngModel)]="formData.tipoProduccion">
      <option value="">Seleccione un tipo</option>
      <option value="organica">Orgánica</option>
      <option value="convencional">Convencional</option>
      <option value="mixta">Mixta</option>
    </select>

    <div *ngIf="error" class="mensaje-error">{{ error }}</div>

    <div class="form-botones">
      <button type="submit" class="btn-verde" [disabled]="cargando">
        {{ cargando ? 'Registrando...' : 'Registrar' }}
      </button>
      <button type="button" class="btn-cancelar" routerLink="/usuario/produccion">Cancelar</button>
    </div>

  </form>
</div>

<app-exito
  *ngIf="exito"
  mensaje="El lugar de producción fue registrado correctamente"
  (volver)="volverListado()">
</app-exito>
