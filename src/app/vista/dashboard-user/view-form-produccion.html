<div class="form-container" *ngIf="!exito">
  <h1>Registro de Lugar de Producción</h1>

  <form #formProduccion="ngForm" (ngSubmit)="registrarProduccion()">

    <label>Nombre del lugar <span class="obligatorio">*</span></label>
    <input type="text" name="nombre" [(ngModel)]="formData.nombre" required
      #nombreRef="ngModel"
      [class.input-error]="nombreRef.invalid && (nombreRef.touched || intentoEnvio)"
      placeholder="Nombre del lugar de producción">
    <span class="mensaje-error" *ngIf="nombreRef.invalid && (nombreRef.touched || intentoEnvio)">
      El nombre del lugar es obligatorio.
    </span>

    <label>Predio asociado <span class="obligatorio">*</span></label>
    <select name="predio" [(ngModel)]="formData.predioId" required
      #predioRef="ngModel"
      [class.input-error]="predioRef.invalid && (predioRef.touched || intentoEnvio)">
      <option value="">Seleccione un predio</option>
      <option *ngFor="let predio of predios" [value]="predio.nroRegistroICA">
        {{ predio.nombre }}
      </option>
    </select>
    <span class="mensaje-error" *ngIf="predioRef.invalid && (predioRef.touched || intentoEnvio)">
      Seleccione un predio asociado.
    </span>

    <label>Extensión (hectáreas)</label>
    <input type="number" name="extension" [(ngModel)]="formData.extension"
      placeholder="Extensión en hectáreas">

    <label>Tipo de producción</label>
    <select name="tipoProduccion" [(ngModel)]="formData.tipoProduccion">
      <option value="">Seleccione un tipo</option>
      <option value="organica">Orgánica</option>
      <option value="convencional">Convencional</option>
      <option value="mixta">Mixta</option>
    </select>

    <div *ngIf="error" class="mensaje-error-general">{{ error }}</div>

    <div class="form-botones">
      <button type="submit" class="btn-verde" [disabled]="cargando">
        {{ cargando ? 'Registrando...' : 'Registrar' }}
      </button>
      <button type="button" class="btn-cancelar" routerLink="/usuario/produccion">Cancelar</button>
    </div>

  </form>
</div>

<app-exito
  *ngIf="exito"
  mensaje="El lugar de producción fue registrado correctamente"
  (volver)="volverListado()">
</app-exito>
